<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prompt 優化器 — AI 工具箱</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="../index.html" class="logo">AI 工具箱</a>
    <div class="nav-links">
      <a href="../index.html#tools">工具列表</a>
      <button id="themeToggle" class="btn-icon" title="切換主題">🌙</button>
    </div>
  </div>
</nav>

<div class="tool-page">
  <a href="../index.html#tools" style="font-size:13px;color:var(--text-secondary);">← 返回工具列表</a>
  <h1>💬 Prompt 優化器</h1>
  <p class="page-desc">輸入模糊的需求描述，AI 幫你優化為高品質 Prompt，提升回應準確度。</p>

  <!-- API Key -->
  <div class="card">
    <label>AI 供應商</label>
    <div class="model-select">
      <select id="provider">
        <option value="openai">OpenAI</option>
        <option value="claude">Claude (Anthropic)</option>
        <option value="gemini">Gemini (Google)</option>
      </select>
    </div>
    <label>API Key（僅存在本機瀏覽器）</label>
    <div class="api-key-section">
      <input type="password" id="apiKey" placeholder="sk-... 或 AI Key">
      <button class="btn-secondary" onclick="saveAndUse()">儲存並使用</button>
    </div>
    <div id="keyStatus" class="success-msg" style="display:none;"></div>
  </div>

  <!-- Prompt 輸入 -->
  <div class="card">
    <label>場景類型</label>
    <select id="pType">
      <option value="general">一般對話 / 寫作</option>
      <option value="coding">程式碼生成</option>
      <option value="data">數據分析</option>
      <option value="translation">翻譯</option>
      <option value="summary">摘要濃縮</option>
      <option value="brainstorm">腦力激盪</option>
      <option value="image">AI 繪圖 Prompt（英文）</option>
    </select>

    <label>輸入你的需求描述（越詳細越好）</label>
    <textarea id="pInput" rows="5" placeholder="例如：我想要一個能幫我整理會議記錄的 AI，要能抓出重點、產出待辦事項..."></textarea>

    <label>期望輸出格式（選填）</label>
    <input type="text" id="pFormat" placeholder="例如：條列清單、表格、JSON">

    <label>語氣風格（選填）</label>
    <input type="text" id="pTone" placeholder="例如：專業、口語化、幽默">

    <button class="btn" onclick="optimizePrompt()" id="genBtn">✨ 優化 Prompt</button>
    <div id="loading" class="loading">AI 優化中，請稍候...</div>
    <div id="error" class="error-msg" style="display:none;"></div>
  </div>

  <!-- 結果 -->
  <div class="card" id="resultCard" style="display:none;">
    <label>優化後的 Prompt（可編輯）</label>
    <textarea id="resultText" rows="16" style="width:100%;padding:14px;border:1px solid var(--border);border-radius:8px;font-family:inherit;font-size:14px;line-height:1.8;background:var(--bg);color:var(--text);"></textarea>
    <div style="display:flex;gap:8px;margin-top:12px;">
      <button class="btn" onclick="copyResult()">📋 複製 Prompt</button>
      <button class="btn btn-secondary" onclick="regenerate()">🔄 重新優化</button>
    </div>
    <div id="copyMsg" class="success-msg" style="display:none;"></div>
  </div>
</div>

<script src="../js/app.js"></script>
<script>
function saveAndUse() {
  const p = document.getElementById('provider').value;
  const k = document.getElementById('apiKey').value.trim();
  if (!k) { alert('請輸入 API Key'); return; }
  saveKey(p, k);
  const msg = document.getElementById('keyStatus');
  msg.textContent = '✅ ' + p.toUpperCase() + ' Key 已儲存（本機）';
  msg.style.display = 'block';
}

async function optimizePrompt() {
  const provider = document.getElementById('provider').value;
  const apiKey = getKey(provider) || document.getElementById('apiKey').value.trim();
  if (!apiKey) { showError('請先輸入並儲存 API Key'); return; }

  const pType = document.getElementById('pType').value;
  const pInput = document.getElementById('pInput').value.trim();
  const pFormat = document.getElementById('pFormat').value.trim();
  const pTone = document.getElementById('pTone').value.trim();

  if (!pInput) { showError('請輸入需求描述'); return; }

  const typeDesc = {
    general: '一般對話與寫作',
    coding: '程式碼生成與除錯',
    data: '數據分析與視覺化',
    translation: '翻譯任務',
    summary: '摘要與濃縮',
    brainstorm: '腦力激盪與創意發想',
    image: 'AI 繪圖（Midjourney / DALL-E 等）',
  };

  const prompt = [
    '請幫我將以下需求描述，優化為一個高品質的 AI Prompt。',
    '場景類型：' + (typeDesc[pType] || '一般'),
    '',
    '原始需求：',
    pInput,
    '',
    pFormat ? '期望輸出格式：' + pFormat : '',
    pTone ? '語氣風格：' + pTone : '',
    '',
    '請遵守以下優化原則：',
    '1. 角色設定：明確指定 AI 應扮演的角色',
    '2. 任務說明：清楚描述要做什麼',
    '3. 輸出格式：指定回應的結構與格式',
    '4. 限制條件：列出要注意的事項',
    '5. 範例（如適用）：給出輸入輸出範例',
    '',
    '請直接輸出優化後的 Prompt，不需額外解釋。',
  ].filter(Boolean).join('\n');

  document.getElementById('genBtn').disabled = true;
  document.getElementById('loading').classList.add('active');
  document.getElementById('error').style.display = 'none';

  try {
    const result = await callAI({ provider, apiKey, messages: [{ role: 'user', content: prompt }] });
    document.getElementById('resultText').value = result;
    document.getElementById('resultCard').style.display = 'block';
    document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth' });
  } catch(e) {
    showError(e.message);
  } finally {
    document.getElementById('genBtn').disabled = false;
    document.getElementById('loading').classList.remove('active');
  }
}

async function regenerate() {
  await optimizePrompt();
}

function copyResult() {
  const text = document.getElementById('resultText').value;
  navigator.clipboard.writeText(text).then(() => {
    const msg = document.getElementById('copyMsg');
    msg.textContent = '✅ 已複製到剪貼簿';
    msg.style.display = 'block';
    setTimeout(() => msg.style.display = 'none', 2000);
  });
}

function showError(msg) {
  const el = document.getElementById('error');
  el.textContent = msg;
  el.style.display = 'block';
}
</script>
</body>
</html>
